name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        id: meta
        run: |
          IMAGE=${{ steps.login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG}
          docker build -t $IMAGE ./app
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Push to ECR
        run: docker push ${{ steps.meta.outputs.image }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull & Re-push
        run: |
          IMAGE=${{ needs.build.outputs.image }}
          docker pull $IMAGE
          docker push $IMAGE

      - name: Update Helm values (dev)
        run: sed -i "s|tag:.*|tag: ${IMAGE_TAG}|g" helm/values.dev.yaml

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm/values.dev.yaml
          git commit -m "dev deploy ${IMAGE_TAG}" || true
          git push

  deploy-stage:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: stage
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull & Re-push
        run: |
          IMAGE=${{ needs.build.outputs.image }}
          docker pull $IMAGE
          docker push $IMAGE

      - name: Update Helm values (stage)
        run: sed -i "s|tag:.*|tag: ${IMAGE_TAG}|g" helm/values.stage.yaml

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm/values.stage.yaml
          git commit -m "stage deploy ${IMAGE_TAG}" || true
          git push

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-stage
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull & Re-push
        run: |
          IMAGE=${{ needs.build.outputs.image }}
          docker pull $IMAGE
          docker push $IMAGE

      - name: Update Helm values (prod)
        run: sed -i "s|tag:.*|tag: ${IMAGE_TAG}|g" helm/values.prod.yaml

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm/values.prod.yaml
          git commit -m "prod deploy ${IMAGE_TAG}" || true
          git push
